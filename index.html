<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Álbum ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
}

/* topo */
.header {
  padding: 20px;
  background: #000;
  color: #1DB954;
  font-size: 20px;
  font-weight: bold;
}

/* cards */
.container {
  padding: 15px;
}

.card {
  position: relative;
  margin-bottom: 25px;
  max-width: 350px;
  margin-left: auto;
  margin-right: auto;
}

/* foto */
.photo {
  width: 100%;
  border-radius: 15px;
  display: block;
}

/* botão play */
.play-btn {
  position: absolute;
  bottom: 15px;
  right: 15px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: none;
  background: #1DB954;
  color: white;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(29,185,84,0.7);
  transition: 0.25s;
}

.play-btn:hover {
  transform: scale(1.1);
}

/* animação Spotify */
.playing {
  animation: pulse 1.3s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(29,185,84,0.6); }
  70% { box-shadow: 0 0 0 18px rgba(29,185,84,0); }
  100% { box-shadow: 0 0 0 0 rgba(29,185,84,0); }
}

/* player invisível */
iframe {
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div class="header">
🎧 Nosso Álbum Spotify ❤️
</div>

<div class="container">

  <!-- FOTO 1 -->
  <div class="card">
    <img class="photo" src="foto1.jpg.jpeg">

    <button class="play-btn"
      onclick="togglePlay(this,'https://open.spotify.com/intl-pt/track/76bcaYeKOKTrj9lEc9BZFU?si=9331c8daeaca48d5')">
      ▶
    </button>
  </div>

  <!-- FOTO 2 -->
  <div class="card">
    <img class="photo" src="foto2.jpg.jpeg">

    <button class="play-btn"
      onclick="togglePlay(this,'https://open.spotify.com/intl-pt/track/04h9o3gtRD7fvGafF7ukJj?si=47488055d72742c2')">
      ▶
    </button>
  </div>

  <!-- FOTO 3 -->
  <div class="card">
    <img class="photo" src="foto3.jpg.jpeg">

    <button class="play-btn"
      onclick="togglePlay(this,'https://www.youtube.com/embed/kJQP7kiw5Fk?autoplay=1')">
      ▶
    </button>
  </div>

</div>

<!-- player oculto -->
<iframe id="player" allow="autoplay"></iframe>

<script>
let currentBtn = null;

function togglePlay(btn, url) {

  const player = document.getElementById("player");

  // se clicar no mesmo → pausa
  if (currentBtn === btn) {
    player.src = "";
    btn.innerText = "▶";
    btn.classList.remove("playing");
    currentBtn = null;
    return;
  }

  // desliga anterior
  if (currentBtn) {
    currentBtn.innerText = "▶";
    currentBtn.classList.remove("playing");
  }

  // toca nova música
  player.src = url;

  btn.innerText = "⏸";
  btn.classList.add("playing");

  currentBtn = btn;
}
</script>

</body>
</html>
