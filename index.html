<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>João & Raissa ❤️ App Wrapped</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
background:#000;
overflow:hidden;
}

/* BACKGROUND PREMIUM */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 20% 20%, #5a0017, transparent 40%),
radial-gradient(circle at 80% 80%, #1DB95433, transparent 40%);
animation:bg 8s infinite alternate;
z-index:0;
}

@keyframes bg{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* ===== CELULAR ===== */
.phone{
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
z-index:2;
}

.frame{
width:380px;
height:760px;
background:#0a0a0a;
border-radius:40px;
box-shadow:0 30px 80px rgba(0,0,0,.8);
border:8px solid #111;
overflow:hidden;
position:relative;
}

.notch{
width:150px;
height:25px;
background:#000;
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
border-radius:20px;
z-index:5;
}

/* ===== SPLASH ===== */
.splash{
position:absolute;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
color:#1DB954;
z-index:10;
animation:fadeOut 2s 2.5s forwards;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* ===== LOGIN ===== */
.login{
position:absolute;
inset:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
color:white;
z-index:9;
}

.login input{
padding:10px;
border-radius:10px;
border:none;
width:220px;
}

.login button{
background:#1DB954;
border:none;
padding:10px 20px;
border-radius:20px;
font-weight:700;
color:white;
}

/* ===== APP ===== */
.app{
position:absolute;
inset:0;
background:#121212;
opacity:0;
transition:1s;
overflow-y:auto;
padding-bottom:80px;
}

/* HEADER */
.header{
padding:25px;
text-align:center;
}

.capa{
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
animation:spin 12s linear infinite;
box-shadow:0 0 25px rgba(29,185,84,.3);
}

@keyframes spin{
to{transform:rotate(360deg);}
}

h1{
color:white;
font-size:22px;
margin-top:10px;
}

p{color:#bbb;font-size:13px;}

/* BUTTON */
.play{
margin-top:12px;
background:#1DB954;
border:none;
padding:12px;
border-radius:30px;
color:white;
font-weight:700;
width:100%;
}

/* STATS */
.stats{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:#181818;
padding:12px;
border-radius:15px;
text-align:center;
}

.card h2{color:#1DB954;font-size:18px;}

/* GRID */
.grid{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.card-music{
background:#181818;
padding:10px;
border-radius:12px;
display:flex;
gap:10px;
align-items:center;
}

.card-music img{
width:50px;
height:50px;
border-radius:10px;
object-fit:cover;
}

/* PLAYER */
.player{
position:absolute;
bottom:0;
left:0;
width:100%;
background:#000;
padding:10px;
border-top:1px solid #222;
color:white;
}

/* HEARTS */
.heart{
position:fixed;
bottom:-20px;
font-size:16px;
color:#ff4d6d;
animation:float 6s linear infinite;
pointer-events:none;
z-index:1;
}

@keyframes float{
0%{transform:translateY(0);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<div class="phone">
<div class="frame">

<div class="notch"></div>

<div class="splash">🎧 Spotify Wrapped</div>

<div class="login" id="login">
<h3>🔐 Entrar</h3>
<input type="password" id="senha">
<button onclick="entrar()">Entrar</button>
</div>

<div class="app" id="app">

<div class="header">
<img class="capa" src="foto1.jpg.jpeg">
<h1>João & Raissa ❤️</h1>
<p>Sua experiência Wrapped</p>

<button class="play" onclick="play('Flores')">▶ PLAY</button>
</div>

<!-- STATS WRAPPED -->
<div class="stats">
<div class="card"><h2 id="plays">0</h2><p>Plays</p></div>
<div class="card"><h2 id="tempo">0m</h2><p>Tempo</p></div>
<div class="card"><h2 id="top">-</h2><p>Top música</p></div>
<div class="card"><h2 id="dias">0</h2><p>Dias juntos</p></div>
</div>

<!-- MUSICAS -->
<div class="grid">

<div class="card-music" onclick="play('Flores')">
<img src="foto2.jpg.jpeg"><p>Flores</p>
  <button class="play" onclick="play('Vibe')">▶ PLAY</button>
</div>

<div class="card-music" onclick="play('Vibe')">
<img src="foto3.jpg.jpeg"><p>Vibe</p>
  <button class="play" onclick="play('Flores')">▶ PLAY</button>
</div>

<div class="card-music" onclick="play('Refúgio')">
<img src="foto4.jpg.jpeg"><p>Refúgio</p>
  <button class="play" onclick="play('Flores')">▶ PLAY</button>
</div>

<div class="card-music" onclick="play('Destino')">
<img src="foto5.jpg.jpeg"><p>Destino</p>
  <button class="play" onclick="play('Flores')">▶ PLAY</button>
</div>

</div>

</div>
</div>
</div>

<script>

/* WRAPPED ENGINE */
let stats = {
plays:0,
tempo:0,
musicas:{}
};

let atualAudio = new Audio();
let atualNome = "";

/* LOGIN */
function entrar(){
if(document.getElementById("senha").value==="amor"){
document.getElementById("login").style.display="none";
document.getElementById("app").style.opacity="1";
}
}

/* MAPA DAS MÚSICAS */
function getFile(nome){

const map = {
"Flores":"musica1.mp3",
"Vibe":"musica2.mp3",
"Refúgio":"musica3.mp3",
"Destino":"musica4.mp3"
};

return map[nome];
}

/* PLAY REAL */
function play(nome){

const file = getFile(nome);

if(!file){
alert("Música não encontrada");
return;
}

atualNome = nome;

atualAudio.pause();
atualAudio = new Audio(file);
atualAudio.play();

/* STATS */
if(!stats.musicas[nome]){
stats.musicas[nome]={plays:0};
}

stats.musicas[nome].plays++;
stats.plays++;

updateTop();
updateStats();

}

/* STATS UPDATE */
function updateStats(){
document.getElementById("plays").innerText = stats.plays;
document.getElementById("tempo").innerText = Math.floor(stats.tempo)+"m";
}

/* TOP MUSIC */
function updateTop(){

let top="-";
let max=0;

for(let m in stats.musicas){
if(stats.musicas[m].plays>max){
max=stats.musicas[m].plays;
top=m;
}
}

document.getElementById("top").innerText=top;
}

/* DIAS */
const inicio = new Date("2025-06-19");
document.getElementById("dias").innerText =
Math.floor((new Date()-inicio)/(1000*60*60*24));

/* CORAÇÕES */
function heart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
}
setInterval(heart,300);

</script>

</body>
</html>
