<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Spotify ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
}

/* título */
.header {
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
  color: #1DB954;
  background: #000;
}

/* grid de fotos */
.container {
  padding: 15px;
}

/* card */
.card {
  position: relative;
  margin-bottom: 20px;
}

/* foto */
.photo {
  width: 100%;
  max-width: 350px;
  border-radius: 15px;
  display: block;
  margin: auto;
}

/* botão play */
.play-btn {
  position: absolute;
  bottom: 15px;
  right: 15px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: none;
  background: #1DB954;
  color: white;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 0 10px #1DB954;
  transition: 0.3s;
}

/* hover */
.play-btn:hover {
  transform: scale(1.1);
}

/* animação quando tocando */
.playing {
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(29,185,84,0.7); }
  70% { box-shadow: 0 0 0 15px rgba(29,185,84,0); }
  100% { box-shadow: 0 0 0 0 rgba(29,185,84,0); }
}

/* player invisível */
iframe {
  width: 1px;
  height: 1px;
  opacity: 0;
}
</style>
</head>

<body>

<div class="header">
🎧 Nosso Spotify ❤️
</div>

<div class="container">

  <!-- FOTO 1 -->
  <div class="card">
    <img class="photo" src="foto1.jpg">
    <button class="play-btn"
      onclick="togglePlay(this,'https://www.youtube.com/embed/hh9WgYHRuhU?autoplay=1')">
      ▶
    </button>
  </div>

  <!-- FOTO 2 -->
  <div class="card">
    <img class="photo" src="foto2.jpg">
    <button class="play-btn"
      onclick="togglePlay(this,'https://www.youtube.com/embed/dhYOPzcsbGM?autoplay=1')">
      ▶
    </button>
  </div>

  <!-- FOTO 3 -->
  <div class="card">
    <img class="photo" src="foto3.jpg">
    <button class="play-btn"
      onclick="togglePlay(this,'https://www.youtube.com/embed/kJQP7kiw5Fk?autoplay=1')">
      ▶
    </button>
  </div>

</div>

<!-- player oculto -->
<iframe id="player" allow="autoplay"></iframe>

<script>
let currentBtn = null;

function togglePlay(btn, url) {

  // se clicar no mesmo botão → pausa
  if (currentBtn === btn) {
    document.getElementById("player").src = "";
    btn.innerText = "▶";
    btn.classList.remove("playing");
    currentBtn = null;
    return;
  }

  // para anterior
  if (currentBtn) {
    currentBtn.innerText = "▶";
    currentBtn.classList.remove("playing");
  }

  // toca nova música
  document.getElementById("player").src = url;

  btn.innerText = "⏸";
  btn.classList.add("playing");

  currentBtn = btn;
}
</script>

</body>
</html>
