<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>João & Raissa ❤️ Wrapped</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;700;800&display=swap" rel="stylesheet">

<style>

/* BASE */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
background:#121212;
color:white;
overflow-x:hidden;
}

/* LOGIN */
.login{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
z-index:9999;
}

.login input{
padding:10px;
border:none;
border-radius:8px;
width:220px;
}

.login button{
padding:10px 20px;
background:#1DB954;
border:none;
border-radius:20px;
color:white;
font-weight:700;
}

/* FUNDO WRAPPED */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at 20% 20%, #5a0017, transparent 40%),
radial-gradient(circle at 80% 80%, #1DB95433, transparent 40%);
animation:bg 10s infinite alternate;
z-index:0;
}

@keyframes bg{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* CORAÇÕES */
.heart{
position:fixed;
bottom:-20px;
font-size:18px;
color:#ff4d6d;
animation:float 6s linear infinite;
pointer-events:none;
z-index:1;
}

@keyframes float{
0%{transform:translateY(0);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* APP */
.spotify{
display:flex;
min-height:100vh;
opacity:0;
transition:1s;
position:relative;
z-index:2;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#000;
padding:30px;
position:fixed;
height:100%;
}

.logo{
font-size:28px;
font-weight:800;
color:#1DB954;
margin-bottom:40px;
}

/* CONTENT */
.content{
margin-left:260px;
width:100%;
padding:40px;
background:linear-gradient(to bottom,#5a0017,#121212);
}

/* HEADER */
.header{
display:flex;
gap:30px;
align-items:center;
flex-wrap:wrap;
}

.capa{
width:260px;
height:260px;
border-radius:50%;
object-fit:cover;
animation:spin 12s linear infinite;
box-shadow:0 20px 40px rgba(0,0,0,.5);
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.info h1{font-size:48px;}
.info p{color:#ddd;}

/* STATS */
.stats{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:#181818;
padding:20px;
border-radius:12px;
text-align:center;
}

.card h2{
color:#1DB954;
}

/* ALBUMS */
.grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.album{
background:#181818;
padding:15px;
border-radius:15px;
transition:.3s;
}

.album:hover{transform:translateY(-5px);}

.album img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.play{
margin-top:10px;
background:#1DB954;
border:none;
padding:10px;
border-radius:20px;
color:white;
font-weight:700;
cursor:pointer;
width:100%;
}

/* CARTA */
.carta{
background:#181818;
padding:25px;
border-radius:12px;
margin-top:40px;
line-height:1.8;
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
}

.player button{
background:#1DB954;
border:none;
padding:10px 20px;
border-radius:20px;
color:white;
font-weight:700;
}

/* MOBILE */
@media(max-width:900px){
.sidebar{display:none;}
.content{margin-left:0;padding:20px;}
.capa{width:180px;height:180px;}
.info h1{font-size:32px;}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<h2>🔐 Acesso</h2>
<input type="password" id="senha">
<button onclick="entrar()">Entrar</button>
</div>

<audio id="audio"></audio>

<div class="spotify" id="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">🎵 Wrapped</div>
</div>

<!-- CONTENT -->
<div class="content">

<div class="header">

<img class="capa" src="foto1.jpg.jpeg">

<div class="info">
<h1>João & Raissa ❤️</h1>
<p>Minha vida é mais completa com você</p>
  <button class="play" onclick="play('musica2.mp3','Flores')">▶ PLAY</button>
</div>

</div>

<!-- STATS -->
<div class="stats">
<div class="card"><h2 id="dias">0</h2><p>Dias juntos</p></div>
<div class="card"><h2>12</h2><p>Músicas</p></div>
<div class="card"><h2>∞</h2><p>Memórias</p></div>
</div>

<!-- ALBUMS (MÚLTIPLAS MÚSICAS DE VOLTA) -->
<div class="grid">

<div class="album">
<img src="foto2.jpg.jpeg">
<h3>Flores Para Você</h3>
<button class="play" onclick="play('musica1.mp3','Flores')">▶ PLAY</button>
</div>

<div class="album">
<img src="foto3.jpg.jpeg">
<h3>Nossa Vibe</h3>
<button class="play" onclick="play('musica3.mp3','Vibe')">▶ PLAY</button>
</div>

<div class="album">
<img src="foto4.jpg.jpeg">
<h3>Refúgio</h3>
<button class="play" onclick="play('musica4.mp3','Refúgio')">▶ PLAY</button>
</div>

<div class="album">
<img src="foto5.jpg.jpeg">
<h3>Destino</h3>
<button class="play" onclick="play('musica5.mp3','Destino')">▶ PLAY</button>
</div>

<div class="album">
<img src="foto6.jpg.jpeg">
<h3>Pra Sempre</h3>
<button class="play" onclick="play('musica6.mp3','Pra Sempre')">▶ PLAY</button>
</div>

<div class="album">
<img src="foto7.jpg.jpeg">
<h3>Memórias</h3>
<button class="play" onclick="play('musica7.mp3','Memórias')">▶ PLAY</button>
</div>

</div>

<!-- CARTA -->
<div class="carta">
💌 Meu amor, esse é nosso Wrapped ❤️
</div>

</div>
</div>

<!-- PLAYER -->
<div class="player">
<div id="status">Nenhuma música</div>
<button onclick="toggle()">Play/Pause</button>
</div>

<script>

const audio = document.getElementById("audio");

/* LOGIN */
function entrar(){
if(document.getElementById("senha").value === "amor"){
document.getElementById("login").style.display="none";
document.getElementById("app").style.opacity="1";
}
}

/* PLAY MUSIC */
function play(src,name){
audio.src = src;
audio.play();
document.getElementById("status").innerText = "🎧 " + name;
}

/* TOGGLE */
function toggle(){
audio.paused ? audio.play() : audio.pause();
}

/* DIAS */
const inicio = new Date("2025-06-19");
document.getElementById("dias").innerText =
Math.floor((new Date()-inicio)/(1000*60*60*24));

/* CORAÇÕES */
function heart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
}
setInterval(heart,300);

</script>

</body>
</html>
