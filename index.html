<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>João & Raissa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
color:white;
overflow-x:hidden;
background:#0a0a0a;
}

/* FUNDO ANIMADO ULTRA PREMIUM */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(-45deg,#1DB954,#5a0017,#0f0f0f,#2a2a2a);
background-size:400% 400%;
animation:gradient 12s ease infinite;
z-index:-2;
opacity:0.35;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* brilho flutuante */
body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('https://i.imgur.com/3pC0J5F.png');
opacity:0.05;
z-index:-1;
}

/* LAYOUT */
.spotify{
display:flex;
min-height:100vh;
backdrop-filter: blur(10px);
}

/* SIDEBAR */
.sidebar{
width:260px;
background:rgba(0,0,0,0.7);
padding:30px;
position:fixed;
height:100%;
backdrop-filter: blur(10px);
border-right:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:30px;
font-weight:800;
margin-bottom:40px;
color:#1DB954;
text-shadow:0 0 20px #1DB954;
}

.sidebar li{
padding:12px 0;
color:#b3b3b3;
font-size:18px;
transition:.3s;
}

.sidebar li:hover{
color:white;
transform:translateX(5px);
}

/* CONTEÚDO */
.content{
margin-left:260px;
width:100%;
padding:40px;
}

/* HEADER */
.header{
display:flex;
gap:30px;
align-items:center;
flex-wrap:wrap;
}

.capa{
width:300px;
height:300px;
object-fit:cover;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
transition:.4s;
}

.capa:hover{
transform:scale(1.03);
}

.info h1{
font-size:55px;
text-shadow:0 0 20px rgba(0,0,0,0.5);
}

.info p{
color:#ddd;
}

/* BOTÃO PLAY */
.play{
margin-top:25px;
background:#1DB954;
color:white;
border:none;
padding:15px 40px;
border-radius:50px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.play:hover{
transform:scale(1.05);
}

.play.ativo{
box-shadow:0 0 25px #1DB954;
}

/* SEÇÕES */
.secao{
margin-top:60px;
}

.secao h2{
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD GLASS */
.album{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:20px;
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.05);
transition:.3s;
}

.album:hover{
transform:translateY(-8px);
background:rgba(255,255,255,0.08);
}

.album img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
}

.album h3{
margin-top:10px;
}

.album p{
color:#ccc;
font-size:14px;
}

/* CARTA */
.carta{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
backdrop-filter: blur(10px);
}

/* FOOTER */
footer{
text-align:center;
padding:50px;
color:#aaa;
}

/* RESPONSIVO */
@media(max-width:900px){
.sidebar{display:none;}
.content{margin-left:0;}
.info h1{font-size:35px;}
.capa{width:100%;max-width:320px;}
}

</style>
</head>

<body>

<audio id="player"></audio>

<div class="spotify">

<div class="sidebar">
<div class="logo">🎵 Spotify</div>
<ul>
<li>🏠 Início</li>
<li>❤️ Amor</li>
<li>🎶 Música</li>
<li>💌 Carta</li>
</ul>
</div>

<div class="content">

<div class="header">

<img class="capa" src="foto1.jpg.jpeg">

<div class="info">
<p>PLAYLIST ULTRA PREMIUM</p>
<h1>João & Raissa ❤️</h1>
<p>Minha música favorita é você.</p>

<button class="play" onclick="togglePlay(this,'musica1.mp3')">
▶ PLAY
</button>

</div>
</div>

<div class="secao">
<h2>📀 Nossos Momentos</h2>

<div class="grid">

<div class="album">
<img src="foto2.jpg.jpeg">
<h3>Flores</h3>
<button class="play" onclick="togglePlay(this,'musica2.mp3')">▶ PLAY</button>
</div>

<div class="album">
<img src="foto3.jpg.jpeg">
<h3>Vibe</h3>
<button class="play" onclick="togglePlay(this,'musica3.mp3')">▶ PLAY</button>
</div>

<div class="album">
<img src="foto4.jpg.jpeg">
<h3>Refúgio</h3>
<button class="play" onclick="togglePlay(this,'musica4.mp3')">▶ PLAY</button>
</div>

</div>
</div>

<div class="secao">
<h2>💌 Carta</h2>

<div class="carta">
Meu amor,<br><br>
Você transformou minha vida em música.<br><br>
❤️
</div>

</div>

<footer>
Feliz Dia dos Namorados ❤️
</footer>

</div>
</div>

<script>

let atualBtn = null;

function togglePlay(btn, src){

const player = document.getElementById("player");

if(atualBtn === btn){
player.pause();
btn.innerHTML = "▶ PLAY";
btn.classList.remove("ativo");
atualBtn = null;
return;
}

if(atualBtn){
atualBtn.innerHTML = "▶ PLAY";
atualBtn.classList.remove("ativo");
}

player.src = src;
player.play();

btn.innerHTML = "⏸ PAUSAR";
btn.classList.add("ativo");

atualBtn = btn;
}

</script>

</body>
</html>
